<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0d9488">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>6周健身打卡 Fitness Tracker</title>
<style>
:root{
  --teal:#0d9488; --teal-light:#ccfbf1; --teal-dark:#0f766e;
  --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --muted:#64748b;
  --border:#e2e8f0; --green:#16a34a; --amber:#d97706; --red:#dc2626;
  --blue:#2563eb; --blue-light:#dbeafe;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  background:var(--bg); color:var(--text); font-size:15px; padding-bottom:70px;}
header{background:var(--teal); color:#fff; padding:14px 16px 10px;
  position:sticky; top:0; z-index:10;}
header .row{display:flex; justify-content:space-between; align-items:center;}
header h1{font-size:17px; font-weight:700;}
.streak{background:rgba(255,255,255,.2); border-radius:14px; padding:3px 10px; font-size:13px; font-weight:600;}
.datenav{display:flex; align-items:center; justify-content:center; gap:14px; margin-top:8px;}
.datenav button{background:rgba(255,255,255,.2); border:none; color:#fff; width:30px; height:30px;
  border-radius:50%; font-size:15px; cursor:pointer;}
.datenav .dlabel{font-size:14px; font-weight:600; min-width:150px; text-align:center;}
.weekbadge{font-size:11px; opacity:.85; text-align:center; margin-top:2px;}
main{padding:12px; max-width:480px; margin:0 auto;}
.card{background:var(--card); border-radius:14px; padding:14px; margin-bottom:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.06); border:1px solid var(--border);}
.card h2{font-size:15px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between;}
.card h2 .sub{font-size:12px; color:var(--muted); font-weight:400;}
.pill{font-size:11px; padding:2px 8px; border-radius:10px; background:var(--teal-light); color:var(--teal-dark); font-weight:600;}
.pill.done{background:#dcfce7; color:var(--green);}
/* exercises */
.exrow{display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid var(--border);}
.exrow:last-child{border-bottom:none;}
.excheck{width:24px; height:24px; min-width:24px; border-radius:50%; border:2px solid var(--border);
  background:#fff; cursor:pointer; font-size:13px; line-height:20px; text-align:center; color:#fff;}
.excheck.on{background:var(--green); border-color:var(--green);}
.exinfo{flex:1; min-width:0;}
.exname{font-size:14px; font-weight:600;}
.exlast{font-size:11px; color:var(--muted);}
.exlast b{color:var(--amber);}
.exinputs{display:flex; gap:4px; align-items:center;}
.exinputs input{width:44px; padding:6px 2px; border:1px solid var(--border); border-radius:8px;
  text-align:center; font-size:13px; -moz-appearance:textfield;}
.exinputs input::-webkit-outer-spin-button,.exinputs input::-webkit-inner-spin-button{-webkit-appearance:none;}
.exinputs .x{font-size:11px; color:var(--muted);}
.exdel{border:none; background:none; color:#cbd5e1; font-size:16px; cursor:pointer; padding:2px;}
.addex{width:100%; padding:8px; margin-top:8px; border:1px dashed var(--border); background:none;
  border-radius:10px; color:var(--teal); font-size:13px; font-weight:600; cursor:pointer;}
.swaprow{background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding:9px; margin:4px 0 8px;}
.exedit{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:6px 0 8px 32px; border-bottom:1px solid var(--border);}
.exedit .exinputs input{width:52px; padding:8px 4px;}
.exedit .exdel{background:none; border:1px dashed var(--border); border-radius:8px; padding:6px 8px; cursor:pointer;}
.resttimer{display:flex; align-items:center; gap:8px; margin-top:10px; background:#f0fdfa; border:1px solid #99f6e4; border-radius:10px; padding:8px 10px;}
.resttimer .disp{flex:1; font-size:15px; font-weight:800; color:var(--teal-dark);}
.resttimer button{padding:7px 14px; border:none; border-radius:8px; background:var(--teal); color:#fff; font-size:13px; font-weight:700; cursor:pointer;}
.schedrow{padding:9px 0; border-bottom:1px solid var(--border);}
.schedrow:last-child{border-bottom:none;}
.schedrow .r1{display:flex; gap:6px; align-items:center; margin-bottom:6px;}
.schedrow .day{font-weight:800; font-size:13px; min-width:34px;}
.schedrow select,.schedrow input{padding:6px 8px; border:1px solid var(--border); border-radius:8px; font-size:13px;}
.schedrow select.nm{flex:1; min-width:0;}
.schedrow .r2{display:flex; gap:6px; align-items:center; font-size:12px; color:var(--muted); padding-left:40px;}
.schedrow .exbtn{border:1px dashed var(--border); background:none; color:var(--teal); border-radius:8px; padding:5px 10px; font-size:12px; cursor:pointer;}
.schedrow input.cmin{width:52px; text-align:center;}
.timerow{display:flex; align-items:center; gap:8px; margin-top:10px; font-size:13px;}
.timerow input[type=time]{padding:6px 8px; border:1px solid var(--border); border-radius:8px; font-size:14px;}
.bigbtn{width:100%; padding:12px; border:none; border-radius:12px; background:var(--teal);
  color:#fff; font-size:15px; font-weight:700; cursor:pointer; margin-top:10px;}
.bigbtn.done{background:var(--green);}
.bigbtn.ghost{background:#f1f5f9; color:var(--muted); font-weight:600;}
/* meals */
.mealslot{padding:10px 0; border-bottom:1px solid var(--border);}
.mealslot:last-child{border-bottom:none;}
.mealhead{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.mealhead .mname{font-weight:700; font-size:14px;}
.mealhead .mtime{font-size:11px; color:var(--muted);}
.chips{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;}
.chip{padding:5px 11px; border-radius:16px; border:1.5px solid var(--border); background:#fff;
  font-size:13px; cursor:pointer; color:var(--muted);}
.chip.on{background:var(--teal); border-color:var(--teal); color:#fff; font-weight:600;}
.amounts{display:flex; gap:6px;}
.amt{flex:1; background:#f8fafc; border:1px solid var(--border); border-radius:10px; padding:6px; text-align:center;}
.amt .lbl{font-size:10px; color:var(--muted);}
.amt .ctl{display:flex; align-items:center; justify-content:center; gap:7px; margin-top:3px;}
.amt button{width:24px; height:24px; border-radius:50%; border:none; background:var(--teal-light);
  color:var(--teal-dark); font-size:15px; font-weight:700; cursor:pointer; line-height:1;}
.amt .val{font-size:14px; font-weight:700; min-width:28px;}
.daytotals{display:flex; gap:4px; margin-top:10px;}
.tot{flex:1; text-align:center; border-radius:10px; padding:7px 2px; background:#f8fafc; border:1px solid var(--border); font-size:10px; color:var(--muted);}
.tot b{display:block; font-size:14px; color:var(--text);}
.tot.ok{background:#dcfce7; border-color:#bbf7d0;}
.tot.ok b{color:var(--green);}
/* water */
.cups{display:flex; gap:10px; justify-content:center; margin:6px 0;}
.cup{font-size:30px; opacity:.25; cursor:pointer; transition:opacity .15s; border:none; background:none;}
.cup.full{opacity:1;}
.waterstat{text-align:center; font-size:13px; color:var(--muted);}
.waterstat b{color:var(--blue); font-size:16px;}
/* weight tab */
.wstats{display:flex; gap:8px; margin-bottom:12px;}
.wstat{flex:1; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 6px; text-align:center;}
.wstat .lbl{font-size:10px; color:var(--muted);}
.wstat .val{font-size:17px; font-weight:800; margin-top:2px;}
.weightinput{display:flex; gap:6px; margin-bottom:10px;}
.weightinput input{flex:1; min-width:0; padding:10px 6px; border:1.5px solid var(--border); border-radius:10px; font-size:14px; text-align:center;}
.weightinput input::placeholder{font-size:12px; color:#94a3b8;}
.weightinput button{padding:0 16px; border:none; border-radius:10px; background:var(--teal); color:#fff; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap;}
#chart{width:100%; height:auto;}
.legend{display:flex; gap:14px; justify-content:center; font-size:11px; color:var(--muted); margin-top:6px;}
.legend i{display:inline-block; width:14px; height:3px; border-radius:2px; vertical-align:middle; margin-right:4px;}
/* history */
.cal{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
.cal .hd{text-align:center; font-size:11px; color:var(--muted); font-weight:600; padding:2px 0;}
.cell{aspect-ratio:1; border-radius:8px; background:#f1f5f9; display:flex; flex-direction:column;
  align-items:center; justify-content:center; font-size:11px; cursor:pointer; border:1px solid transparent;}
.cell.future{opacity:.35;}
.cell.today{border-color:var(--teal); border-width:2px;}
.cell .d{font-weight:700; font-size:11px;}
.cell .marks{font-size:8px; letter-spacing:-1px;}
.cell.full{background:#dcfce7;}
.cell.part{background:#fef9c3;}
.weekcard{border-left:4px solid var(--teal);}
.wkrow{display:flex; justify-content:space-between; font-size:13px; padding:3px 0; color:var(--muted); gap:10px;}
.wkrow b{color:var(--text); text-align:right;}
/* tabs */
nav{position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border);
  display:flex; z-index:10; padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1; padding:9px 0 7px; border:none; background:none; font-size:11px; color:var(--muted); cursor:pointer;}
nav button .ico{display:block; font-size:20px; margin-bottom:1px;}
nav button.on{color:var(--teal); font-weight:700;}
.planset{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.planset > div{min-width:0;}
.planrow{border:1px solid var(--border); border-radius:12px; padding:10px; margin-bottom:8px;}
.planrow.active{border-color:var(--teal); background:#f0fdfa;}
.planrow .r1{display:flex; align-items:center; gap:6px; font-size:14px;}
.planrow .r2{font-size:12px; color:var(--muted); margin-top:4px;}
.planset label{font-size:11px; color:var(--muted); display:block; margin-bottom:3px;}
.planset input{width:100%; min-width:0; padding:9px; border:1px solid var(--border); border-radius:10px; font-size:15px; box-sizing:border-box;}
.planset input[type=date]{-webkit-appearance:none; appearance:none; background:#fff; min-height:40px; text-align:left;}
.settings{display:flex; gap:8px; margin-top:4px;}
.settings button{flex:1; padding:9px; border:1px solid var(--border); background:var(--card);
  border-radius:10px; font-size:13px; color:var(--muted); cursor:pointer;}
.confetti{position:fixed; top:-14px; width:9px; height:14px; z-index:50; pointer-events:none;
  animation:confall 2.5s ease-in forwards; border-radius:2px;}
@keyframes confall{to{transform:translateY(106vh) rotate(720deg); opacity:.85;}}
.milestone{position:fixed; top:38%; left:50%; transform:translateX(-50%); background:#fff;
  border:2px solid var(--teal); color:var(--teal-dark); font-size:16px; font-weight:800;
  padding:14px 20px; border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,.18); z-index:51;
  animation:mpop .3s ease; text-align:center; max-width:85vw;}
@keyframes mpop{from{transform:translateX(-50%) scale(.6); opacity:0;}}
.toast{position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--text);
  color:#fff; padding:9px 18px; border-radius:20px; font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:20; white-space:nowrap;}
.toast.show{opacity:1;}
.empty{text-align:center; color:var(--muted); font-size:13px; padding:18px 0;}
</style>
</head>
<body>
<header>
  <div class="row">
    <h1 id="appTitle">💪 6周打卡 Fitness</h1>
    <span class="streak" id="streakBadge">🔥 0天</span>
  </div>
  <div class="datenav" id="datenav">
    <button onclick="navDate(-1)">‹</button>
    <span class="dlabel" id="dateLabel"></span>
    <button onclick="navDate(1)">›</button>
  </div>
  <div class="weekbadge" id="weekBadge"></div>
</header>

<main>
  <div id="view-today"></div>
  <div id="view-weight" style="display:none"></div>
  <div id="view-history" style="display:none"></div>
  <div id="view-settings" style="display:none"></div>
</main>

<nav>
  <button id="tab-today" class="on" onclick="switchTab('today')"><span class="ico">✅</span>今日 Today</button>
  <button id="tab-weight" onclick="switchTab('weight')"><span class="ico">⚖️</span>体重 Weight</button>
  <button id="tab-history" onclick="switchTab('history')"><span class="ico">📅</span>历史 History</button>
  <button id="tab-settings" onclick="switchTab('settings')"><span class="ico">⚙️</span>设置 Settings</button>
</nav>
<div class="toast" id="toast"></div>

<script>
/* ================= data ================= */
/* 新用户默认空白，开始日期=今天 blank defaults for new users; start date = today */
/* 个人资料全局，计划支持多个不同时间段 profile is global, plans are per-period */
const DEF_SETTINGS = {heightCm:'', age:'', sex:'F', activity:1.4, name:'', waterL:3};
const DEF_PLAN = {name:'', startDate:'', weeks:4, startW:'', endW:''};
let PLAN_START, PLAN_END, W_START, W_END, PLAN_WEEKS;
const STORE_KEY = 'fitness6w_v1';
/* 护膝版默认课表（可在设置中编辑）：30min无氧+30min有氧/天 knee-friendly default, editable */
const DEFAULT_SCHEDULE = {
  1:{type:'gym', name:'下肢/臀腿 Lower & Glutes (护膝)', where:'12:00 · 办公室健身房 Office gym',
     ex:['罗马尼亚硬拉 RDL','腿弯举 Leg Curl','臀推 Hip Thrust','坐姿髋外展 Hip Abduction','箱式浅蹲 Box Squat (高箱)'], cardio:{min:30}},
  2:{type:'gym', name:'上肢 Upper', where:'12:00 · 办公室健身房 Office gym',
     ex:['高位下拉 Lat Pulldown','坐姿推胸 Chest Press','坐姿划船 Seated Row','肩上推举 Shoulder Press','二头弯举 Biceps Curl','三头下压 Triceps Pushdown'], cardio:{min:30}},
  3:{type:'home', name:'哑铃全身 Dumbbell Full Body', where:'12:00 · 家 Home',
     ex:['椅子坐站 Sit-to-Stand','哑铃硬拉 DB RDL','地板卧推 Floor Press','单臂划船 1-Arm Row','平板支撑 Plank'], cardio:{min:30}},
  4:{type:'gym', name:'全身 Full Body', where:'12:00 · 办公室健身房 Office gym',
     ex:['相扑硬拉 Sumo Deadlift','上斜推胸 Incline Press','绳索划船 Cable Row','臀推 Hip Thrust','农夫行走 Farmer Carry'], cardio:{min:30}},
  5:{type:'home', name:'力量循环 Strength Circuit (低冲击)', where:'12:00 · 家 Home',
     ex:['哑铃摆荡 DB Swing','出拳 Shadowbox Punch','弹力带划船 Band Row','臀桥 Glute Bridge','低冲击开合 Step Jacks'], cardio:{min:30}},
  6:{type:'rest', name:'休息 / 遛娃散步 Rest / Walk', where:'', ex:[], cardio:null},
  0:{type:'rest', name:'休息 Rest · 备餐日 Meal Prep', where:'', ex:[], cardio:null}
};
const TYPE_ICON = {gym:'🏋️', home:'💪', rest:'🚶'};
/* 无氧部位预设（全部护膝），按用途分组无重复 strength presets, grouped, no overlap */
const STRENGTH_PRESETS = [
  {key:'lower',    group:'按部位 By Part',        name:'下肢/臀腿 Lower & Glutes (护膝)', ex:['罗马尼亚硬拉 RDL','腿弯举 Leg Curl','臀推 Hip Thrust','坐姿髋外展 Hip Abduction','箱式浅蹲 Box Squat (高箱)']},
  {key:'upper',    group:'按部位 By Part',        name:'上肢 Upper',                     ex:['高位下拉 Lat Pulldown','坐姿推胸 Chest Press','坐姿划船 Seated Row','肩上推举 Shoulder Press','二头弯举 Biceps Curl','三头下压 Triceps Pushdown']},
  {key:'full',     group:'按部位 By Part',        name:'全身 Full Body',                 ex:['相扑硬拉 Sumo Deadlift','上斜推胸 Incline Press','绳索划船 Cable Row','臀推 Hip Thrust','农夫行走 Farmer Carry']},
  {key:'core',     group:'按部位 By Part',        name:'核心 Core',                      ex:['平板支撑 Plank','死虫式 Dead Bug','鸟狗式 Bird Dog','侧平板 Side Plank','农夫行走 Farmer Carry']},
  {key:'dumbbell', group:'居家少器械 Home',       name:'哑铃全身 Dumbbell Full Body',    ex:['椅子坐站 Sit-to-Stand','哑铃硬拉 DB RDL','地板卧推 Floor Press','单臂划船 1-Arm Row','平板支撑 Plank']},
  {key:'circuit',  group:'居家少器械 Home',       name:'力量循环 Strength Circuit (低冲击)', ex:['哑铃摆荡 DB Swing','出拳 Shadowbox Punch','弹力带划船 Band Row','臀桥 Glute Bridge','低冲击开合 Step Jacks']}
];
function presetOptionsHtml(sc){
  const groups=[];
  STRENGTH_PRESETS.forEach(p=>{ let g=groups.find(x=>x.label===p.group); if(!g){ g={label:p.group, items:[]}; groups.push(g); } g.items.push(p); });
  return groups.map(g=>`<optgroup label="${g.label}">`+
    g.items.map(p=>`<option value="${p.key}" ${sc.name===p.name?'selected':''}>${p.name}</option>`).join('')+
    `</optgroup>`).join('');
}
/* 部位下拉即当天名称：匹配预设时选中预设，否则显示自定义 */
function presetSelectHtml(d, sc){
  const matched = STRENGTH_PRESETS.some(p=>p.name===sc.name);
  let first='';
  if(!matched) first = sc.type==='rest'
    ? '<option value="" selected>💪 选无氧部位…</option>'
    : `<option value="" selected disabled>✏️ ${sc.name}（自定义）</option>`;
  return `<select class="nm" onchange="applyPreset(${d},this.value)">${first}${presetOptionsHtml(sc)}</select>`;
}
/* 每个计划自带课表，按日期取所属计划 each plan has its own schedule */
function planForDate(ds){
  for(const p of (db.plans||[])){ if(parse(p.startDate)<=parse(ds) && parse(planEnd(p))>=parse(ds)) return p; }
  return activePlan();
}
function schedFor(p){ if(p && !p.schedule) p.schedule=JSON.parse(JSON.stringify(DEFAULT_SCHEDULE)); return (p&&p.schedule)||DEFAULT_SCHEDULE; }
function SCHED(wd, ds){ const p = ds ? planForDate(ds) : activePlan(); const sc=(p&&p.schedule)||DEFAULT_SCHEDULE; return sc[wd]||DEFAULT_SCHEDULE[wd]; }
const CARDIO_TYPES = ['快走 Brisk Walk','爬坡 Incline Walk','爬楼 Stair Climb','HIIT','遛娃散步 Stroller Walk'];
function cardioOptions(){ return CARDIO_TYPES.concat(db.customCardio||[]); }
const MEALS = [
  {key:'breakfast', name:'早餐 Breakfast', time:'~8:30'},
  {key:'lunch', name:'午餐 Lunch', time:'~12:30'},
  {key:'snack', name:'加餐 Snack', time:'可选 optional', optional:true},
  {key:'dinner', name:'晚餐 Dinner', time:'~19:00'}
];
/* 建议食物重量由 mealDefault() 按个人资料动态计算 suggested grams computed from profile */
/* 每克热量估算 kcal per gram of food (cooked where applicable) */
const KCAL_PER_G = {salmon:2.08, chicken:1.65, beef:2.5, tofu:0.8, eggs:1.55, milk:0.64, shake:4.0};
const KCAL_CARB = 1.3, KCAL_VEG = 0.25, KCAL_PROTEIN_DEFAULT = 1.7;
/* 加餐选项：固定份量+估算热量, p=蛋白质类食物等效克数 snack picker, fixed portions */
const SNACK_OPTIONS = [
  {key:'egg',     label:'🥚 鸡蛋×1',        kcal:78,  p:50},
  {key:'yogurt',  label:'🥛 酸奶一杯',       kcal:120, p:100},
  {key:'apple',   label:'🍎 苹果',          kcal:95,  p:0},
  {key:'nuts',    label:'🥜 坚果一小把',     kcal:170, p:0},
  {key:'banana',  label:'🍌 香蕉',          kcal:105, p:0},
  {key:'jerky',   label:'🥩 牛肉干一小包',   kcal:90,  p:30},
  {key:'tomato',  label:'🍅 小番茄/黄瓜',    kcal:30,  p:0}
];
/* 已下架但需为历史记录保留估值 retired options kept for old logs */
const SNACK_HIDDEN = [
  {key:'shake', label:'🥤 蛋白粉一勺', kcal:120, p:50},
  {key:'cheese', label:'🧀 奶酪棒', kcal:80, p:25},
  {key:'edamame', label:'🫘 毛豆一碗', kcal:120, p:50}
];
function snackOpt(k){ return SNACK_OPTIONS.concat(db.customSnacks||[], SNACK_HIDDEN).find(x=>x.key===k); }
function snackP(ml){ return (ml.items||[]).reduce((s,k)=>{ const o=snackOpt(k); return s+(o?o.p:0); },0); }
/* 常见食物热量库（一份的量）用于自定义加餐自动估算 mini food-kcal DB for custom snacks */
const FOOD_KCAL_DB = [

function addSnackOption(){
  const n=prompt('食物名称 Food name（如: 橙子、全麦面包、蛋白棒）:'); if(!n||!n.trim()) return;
  const name=n.trim().replace(/['"<>`\\]/g,'');
  if(!db.customSnacks) db.customSnacks=[];
  let opt=db.customSnacks.find(o=>o.key==='c_'+name);
  if(!opt){
    const hit=FOOD_KCAL_DB.find(f=>name.includes(f[0]));
    let kcal, p=0;
    if(hit){ kcal=hit[1]; p=hit[2]; }
    else { kcal=parseInt(prompt(`没认出「${name}」，输入一份的估算热量 kcal:`, '100'))||100; }
    opt={key:'c_'+name, label:'🍴 '+name, kcal:kcal, p:p};
    db.customSnacks.push(opt);
  }
  const m=getMeal('snack'); if(!m.items) m.items=[];
  if(!m.items.includes(opt.key)) m.items.push(opt.key);
  save(); renderToday(); toast(`✓ ${name} ≈${opt.kcal} kcal`);

/* 运动消耗估算 burn estimates: kcal = MET × 体重kg × 小时 */
const CARDIO_MET = [['爬楼',8.5],['HIIT',8],['健身操',6.5],['单车',6],['游泳',6],['爬坡',5.3],['椭圆机',5],['快走',4.3],['遛娃',3.5]];
function metFor(type){ const f=CARDIO_MET.find(p=>type&&type.includes(p[0])); return f?f[1]:5; }
function bodyWeightFor(ds){
  let d=ds;
  for(let i=0;i<60;i++){ const lg=db.logs[d]; if(lg&&lg.weight) return lg.weight; d=addDays(d,-1); }
  return parseFloat(activePlan().startW)||65;
}
function dayBurn(ds){
  const s=db.settings, kg=bodyWeightFor(ds);
  const ht=parseInt(s.heightCm)||165, ag=parseInt(s.age)||30;
  const bmr = 10*kg + 6.25*ht - 5*ag + (s.sex==='M'?5:-161);
  const base = Math.round(bmr*(s.activity||1.4));            // 基础代谢+日常活动
  const lg = db.logs[ds]||{};
  const strength = (lg.workout&&lg.workout.done&&SCHED(parse(ds).getDay(),ds).type!=='rest') ? Math.round(4.5*kg*0.5) : 0; // 力量约4.5MET×30min
  const cardio = (lg.cardio&&lg.cardio.done) ? Math.round(metFor(lg.cardio.type)*kg*(lg.cardio.min||30)/60) : 0;
  return {base, strength, cardio, total: base+strength+cardio};
}
function mealKcal(ml){
  if(ml.items) return ml.items.reduce((s,k)=>{ const o=snackOpt(k); return s+(o?o.kcal:0); },0);
  const d = (ml.proteins && ml.proteins.length)
    ? ml.proteins.reduce((s,k)=>s+(KCAL_PER_G[k]||KCAL_PROTEIN_DEFAULT),0)/ml.proteins.length
    : KCAL_PROTEIN_DEFAULT;
  return Math.round((ml.protein||0)*d + (ml.carbs||0)*KCAL_CARB + (ml.veg||0)*KCAL_VEG);
}

function parse(ds){ const [y,m,d]=ds.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(ds,n){ const d=parse(ds); d.setDate(d.getDate()+n); return fmt(d); }

/* 活跃计划：含今天的；否则最近已开始的；否则最早的未来计划 active plan = contains today, else most recent, else earliest future */
function activePlan(){
  const sorted = db.plans.slice().sort((a,b)=>parse(a.startDate)-parse(b.startDate));
  for(const p of sorted){ const end=addDays(p.startDate,p.weeks*7-1);
    if(parse(p.startDate)<=parse(TODAY) && parse(end)>=parse(TODAY)) return p; }
  let last=null; for(const p of sorted){ if(parse(p.startDate)<=parse(TODAY)) last=p; }
  return last || sorted[0];
}
function planEnd(p){ return addDays(p.startDate, p.weeks*7-1); }

/* 个人资料→自动计算目标 profile-driven targets (Mifflin-St Jeor, -500 kcal deficit) */
function profileComplete(){ const s=db.settings, ap=activePlan(); return !!(parseFloat(ap.startW)&&parseFloat(ap.endW)&&parseInt(s.heightCm)&&parseInt(s.age)); }
function targets(){
  const s = db.settings;
  // 资料未填时用通用回退值 generic fallbacks until profile is filled
  const sw=parseFloat(s.startW)||65, ew=parseFloat(s.endW)||60, ht=parseInt(s.heightCm)||165, ag=parseInt(s.age)||30;
  const bmr = 10*sw + 6.25*ht - 5*ag + (s.sex==='M'?5:-161);
  const kcal = Math.max(1200, Math.round((bmr*(s.activity||1.4) - 500)/25)*25);
  const protein = Math.round((ew*1.6/0.25)/50)*50;  // 1.6g蛋白/kg目标体重 ÷ 平均25%含量 → 食物克数
  const carbs = Math.min(400, Math.max(100, Math.round((kcal*0.30/KCAL_CARB)/50)*50));
  return {protein:protein, carbsMax:carbs, veg:400, waterL:parseFloat(s.waterL)||3, kcalMax:kcal};
}
function fist(g){ return parseFloat((g/100).toFixed(1)); } // 1拳 ≈ 100g
function mealDefault(k){
  const T = targets();
  const p = Math.round(T.protein/3/50)*50;
  const cb = Math.round(T.carbsMax/6/50)*50, cl = Math.round(T.carbsMax/2/50)*50;
  if(k==='breakfast') return {protein:p, carbs:cb, veg:0};
  if(k==='lunch')     return {protein:p, carbs:cl, veg:200};
  if(k==='dinner')    return {protein:T.protein-2*p, carbs:Math.max(0,T.carbsMax-cb-cl), veg:200};
  return {items:[], protein:0, carbs:0, veg:0}; // snack: tap-to-pick items, no grams
}

/* 起始重量轻量个性化：默认值按75kg女性标定，按性别×体重缩放 scale starting weights by sex & bodyweight (baseline: 75kg female) */
function startWeightScale(ds){
  const s = db.settings;
  const sexF = s.sex==='M' ? 1.5 : 1;
  let kg = null, d = ds;
  for(let i=0;i<60;i++){ const lg=db.logs[d]; if(lg&&lg.weight){ kg=lg.weight; break; } d=addDays(d,-1); }
  kg = kg || parseFloat(s.startW) || 0;
  const bwF = kg ? Math.min(1.3, Math.max(0.8, kg/75)) : 1;
  return sexF*bwF;
}
function scaleStartW(w, ds){
  if(!w) return 0;
  const sw = w*startWeightScale(ds);
  return sw>=15 ? Math.round(sw/2.5)*2.5 : Math.round(sw*2)/2; // 大重量取2.5整数倍, 小哑铃取0.5
}

/* 双重渐进 double progression: 完成12次→加重并回到10次; 否则下次+1次; 自重/计时动作+5秒(上限60) */
function suggestFor(name, ds){
  const last = lastRecord(name, ds);
  if(!last){ const d = EX_DEFAULTS[name]||GENERIC_DEFAULT;
    return {weight:scaleStartW(d[0], ds), reps:d[1], sets:d[2], why:'建议起步 suggested start'}; }
  const w = parseFloat(last.weight)||0, r = parseInt(last.reps)||0, s = parseInt(last.sets)||3;
  if(w > 0){
    if(r >= 12){ const inc = w >= 15 ? 2.5 : 1;
      return {weight:Math.round((w+inc)*10)/10, reps:10, sets:s, why:'上次≥12次 → 加重 add weight'}; }
    return {weight:w, reps:Math.min(12,r+1), sets:s, why:'+1次 rep'};
  }
  if(r < 60) return {weight:0, reps:r+5, sets:s, why:'+5秒 sec'};
  return {weight:0, reps:r, sets:s, why:'保持 keep'};
}
function lastRecord(exName, beforeDs){
  let ds = addDays(beforeDs,-1);
  for(let i=0;i<60;i++){
    const lg = db.logs[ds];
    if(lg && lg.workout && lg.workout.ex){
      const e = lg.workout.ex.find(x=>x.name===exName && x.done && (x.weight||x.reps));
      if(e) return e;
    }
    ds = addDays(ds,-1);
  }
  return null;
}
function getWorkout(ds){
  const lg = dayLog(ds);
  if(!lg.workout){
    const sch = SCHED(parse(ds).getDay(), ds);
    // sticky preference: 沿用上一次同部位打卡的动作清单 reuse last checked-in exercise list for this focus
    let names = sch.ex;
    let d = addDays(ds,-1);
    for(let i=0;i<90;i++){
      const plg = db.logs[d];
      if(plg && plg.workout && plg.workout.done && plg.workout.name===sch.name && plg.workout.ex && plg.workout.ex.length){
        names = plg.workout.ex.map(e=>e.name); break;
      }
      d = addDays(d,-1);
    }
    lg.workout = {done:false, time:'', name:sch.name, ex:names.map(n=>{
      const sg = suggestFor(n, ds);
      return {name:n, weight:sg.weight ? String(sg.weight) : '', reps:String(sg.reps), sets:String(sg.sets), done:false};
    })};
  }
  return lg.workout;
}

/* 达标预测：对最近14天体重做线性回归外推 project goal date from recent trend */
function projection(){
  const pts=weightSeries(); if(pts.length<3) return {state:'nodata'};
  const lastT=parse(pts[pts.length-1].ds).getTime();
  const win=pts.filter(p=>lastT-parse(p.ds).getTime()<=13*864e5);
  if(win.length<3 || (lastT-parse(win[0].ds).getTime())<4*864e5) return {state:'nodata'};
  const xs=win.map(p=>parse(p.ds).getTime()/864e5), ys=win.map(p=>p.w);
  const n=xs.length, mx=xs.reduce((a,b)=>a+b)/n, my=ys.reduce((a,b)=>a+b)/n;
  let num=0, den=0;
  for(let i=0;i<n;i++){ num+=(xs[i]-mx)*(ys[i]-my); den+=(xs[i]-mx)*(xs[i]-mx); }
  const slope=num/den; // kg/天
  const cur=ys[ys.length-1];
  if(!(W_END>0)) return {state:'nogoal'};
  if(cur<=W_END) return {state:'done'};
  if(slope>=-0.005) return {state:'flat'};
  const days=Math.round((cur-W_END)/(-slope));
  if(days>365) return {state:'flat'};
  return {state:'ok', eta:addDays(TODAY,days), weekly:Math.round(-slope*7*100)/100};
}

}

function chartSVG(pts,ma){
  const W=440,H=240,L=38,R=10,T=14,B=24;
  const t0=parse(PLAN_START).getTime(), t1=parse(PLAN_END).getTime();
  let ws=[W_END,W_START,...pts.map(p=>p.w)].filter(v=>v>0);
  if(!ws.length) ws=[60,80];
  let ymin=Math.floor(Math.min(...ws))-0.5, ymax=Math.ceil(Math.max(...ws))+0.5;
  const X=t=>L+(t-t0)/(t1-t0)*(W-L-R);
  const Y=w=>T+(ymax-w)/(ymax-ymin)*(H-T-B);
  let s=`<svg id="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines + y labels
  for(let w=Math.ceil(ymin);w<=ymax;w++){
    s+=`<line x1="${L}" y1="${Y(w)}" x2="${W-R}" y2="${Y(w)}" stroke="#e2e8f0" stroke-width="1"/>
        <text x="${L-5}" y="${Y(w)+3}" font-size="9" fill="#94a3b8" text-anchor="end">${w}</text>`;
  }
  // x labels: week starts
  const d0=parse(PLAN_START);
  for(let i=0;i<=PLAN_WEEKS;i++){
    const t=t0+i*7*864e5; if(t>t1)break;
    s+=`<text x="${X(t)}" y="${H-8}" font-size="9" fill="#94a3b8" text-anchor="middle">${i===0?(d0.getMonth()+1)+'/'+d0.getDate():'W'+(i+1)}</text>`;
  }
  // target line (only when goal is set)
  if(W_START>0&&W_END>0) s+=`<line x1="${X(t0)}" y1="${Y(W_START)}" x2="${X(t1)}" y2="${Y(W_END)}" stroke="#d97706" stroke-width="2" stroke-dasharray="6 4" opacity=".8"/>`;
  // MA line
  if(ma.length>1) s+=`<polyline points="${ma.map(p=>X(parse(p.ds).getTime())+','+Y(p.w)).join(' ')}" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round"/>`;
  // daily points + thin line
  if(pts.length>1) s+=`<polyline points="${pts.map(p=>X(parse(p.ds).getTime())+','+Y(p.w)).join(' ')}" fill="none" stroke="#0d9488" stroke-width="1" opacity=".45"/>`;
  pts.forEach(p=>{ s+=`<circle cx="${X(parse(p.ds).getTime())}" cy="${Y(p.w)}" r="3" fill="#0d9488"/>`; });
  if(!pts.length) s+=`<text x="${W/2}" y="${H/2}" font-size="12" fill="#94a3b8" text-anchor="middle">还没有体重记录，今天开始吧 No data yet</text>`;
  s+='</svg>'; return s;
}

function addPlan(){
  const sorted=db.plans.slice().sort((a,b)=>parse(a.startDate)-parse(b.startDate));
  const lastP=sorted[sorted.length-1];
  const start=lastP?addDays(lastP.startDate, lastP.weeks*7):TODAY; // 接在上个计划之后
  const np=Object.assign({}, DEF_PLAN, {id:newPlanId(), name:'计划 '+(db.plans.length+1), startDate:start, weeks:4});
  if(lastP && lastP.endW) np.startW=lastP.endW;                    // 起始体重默认=上个计划目标
  db.plans.push(np); editingPlanId=np.id; save(); renderSettings();
}

/* ================= history view ================= */
function dayStatus(ds){
  const lg=db.logs[ds]; if(!lg) return {w:false,m:false,wt:false,any:false};
  const wd=parse(ds).getDay(), isRest=SCHED(wd,ds).type==='rest';
  const w=!!(lg.workout&&lg.workout.done)||(isRest); // rest days don't break streak
  const wReal=!!(lg.workout&&lg.workout.done);
  let mealsLogged=0;
  if(lg.meals) MEALS.forEach(m=>{ const ml=lg.meals[m.key]; if(ml&&ml.done) mealsLogged++; });
  const m=mealsLogged>=2, wt=!!lg.weight, c=!!(lg.cardio&&lg.cardio.done);
  return {w, wReal, m, wt, c, any:wReal||c||mealsLogged>0||wt, complete:w&&m};
}
function streak(){
  let n=0, ds=TODAY;
  // today counts if complete; otherwise start from yesterday
  if(!dayStatus(ds).complete) ds=addDays(ds,-1);
  while(parse(ds)>=parse(PLAN_START)){ if(dayStatus(ds).complete){n++; ds=addDays(ds,-1);} else break; }
  return n;
}
function renderHistory(){
  const v=document.getElementById('view-history');
  let h=`<div class="card"><h2><span>📅 打卡日历 Calendar</span><span class="sub">绿=全完成 黄=部分</span></h2><div class="cal">`;
  ['一','二','三','四','五','六','日'].forEach(d=>h+=`<div class="hd">${d}</div>`);
  // calendar: 默认只展开到当前周 collapsed to current week by default
  let ds=addDays(PLAN_START, -((parse(PLAN_START).getDay()+6)%7));
  const fullEnd=addDays(PLAN_END, 6-((parse(PLAN_END).getDay()+6)%7));
  const nowEnd=addDays(TODAY, 6-((parse(TODAY).getDay()+6)%7));
  const calEnd=(calExpanded || parse(nowEnd)>=parse(fullEnd)) ? fullEnd : nowEnd;
  while(parse(ds)<=parse(calEnd)){
    const st=dayStatus(ds), inPlan=parse(ds)>=parse(PLAN_START)&&parse(ds)<=parse(PLAN_END);
    const future=parse(ds)>parse(TODAY);
    const cls=ds===TODAY?'today':''
    let bg=''; if(!future&&inPlan){ if(st.complete)bg='full'; else if(st.any)bg='part'; }
    const d=parse(ds);
    h+=`<div class="cell ${cls} ${bg} ${future||!inPlan?'future':''}" onclick="openDay('${ds}')">
      <span class="d">${d.getMonth()+1}/${d.getDate()}</span></div>`;
    ds=addDays(ds,1);
  }
  h+=`</div>`;
  if(parse(fullEnd)>parse(calEnd)) h+=`<button class="addex" onclick="calExpanded=true;renderHistory()">▾ 展开完整 ${PLAN_WEEKS} 周 Show all weeks</button>`;
  else if(calExpanded) h+=`<button class="addex" onclick="calExpanded=false;renderHistory()">▴ 收起 Collapse</button>`;
  h+=`<div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center">点任意日期可补打卡 Tap a day to backfill</div></div>`;

  /* weekly reports */
  h+=`<h2 style="font-size:15px;margin:4px 0 10px">📊 周报 Weekly Report</h2>`;
  let any=false;
  for(let wk=1;wk<=PLAN_WEEKS;wk++){
    const start=addDays(PLAN_START,(wk-1)*7);
    if(parse(start)>parse(TODAY)) break;
    any=true;
    const end=addDays(start,6);
    const T=targets();
    let workouts=0, cDays=0, pDays=0, wDays=0, weights=[];
    for(let i=0;i<7;i++){ const ds2=addDays(start,i); const lg=db.logs[ds2]; if(!lg)continue;
      if(lg.workout&&lg.workout.done&&SCHED(parse(ds2).getDay(),ds2).type!=='rest') workouts++;
      if(lg.cardio&&lg.cardio.done) cDays++;
      let tp=0; if(lg.meals) MEALS.forEach(m=>{ const ml=lg.meals[m.key]; if(ml&&ml.done) tp+=(ml.protein||0)+snackP(ml); });
      if(tp>=T.protein) pDays++;
      if((lg.water||0)*CUP_L>=T.waterL) wDays++;
      if(lg.weight) weights.push(lg.weight);
    }
    const avgW=weights.length?Math.round(weights.reduce((a,b)=>a+b)/weights.length*10)/10:null;
    // previous week avg
    let prevW=null;
    if(wk>1){ const ps=addDays(PLAN_START,(wk-2)*7); const pws=[];
      for(let i=0;i<7;i++){ const lg=db.logs[addDays(ps,i)]; if(lg&&lg.weight)pws.push(lg.weight); }
      if(pws.length) prevW=Math.round(pws.reduce((a,b)=>a+b)/pws.length*10)/10;
    }
    const delta=avgW&&prevW?Math.round((avgW-prevW)*10)/10:null;
    h+=`<div class="card weekcard"><h2><span>第 ${wk} 周 Week ${wk}</span><span class="sub">${start.slice(5)} ~ ${end.slice(5)}</span></h2>
      <div class="wkrow"><span>🏋️ 无氧 Strength</span><b>${workouts} / 5</b></div>
      <div class="wkrow"><span>🏃 有氧 Cardio</span><b>${cDays} / 5</b></div>
      <div class="wkrow"><span>⚖️ 周均体重 Avg weight</span><b>${avgW??'–'} kg ${delta!==null?`<span style="color:${delta<=0?'var(--green)':'var(--red)'}">(${delta>0?'+':''}${delta})</span>`:''}</b></div>
      <div class="wkrow"><span>🥩 蛋白达标天数 Protein days</span><b>${pDays} / 7</b></div>
      <div class="wkrow"><span>💧 饮水达标天数 Water days</span><b>${wDays} / 7</b></div></div>`;
  }
  if(!any) h+=`<div class="empty">计划开始后这里会显示每周小结</div>`;
  v.innerHTML=h;
}
function openDay(ds){ if(parse(ds)>parse(TODAY))return; curDate=ds; switchTab('today'); }

/* ================= shell ================= */
function renderHeader(){
  document.getElementById('appTitle').textContent=`💪 ${db.settings.name?db.settings.name+' ':''}${PLAN_WEEKS}周打卡 Fitness`;
  const d=parse(curDate);
  document.getElementById('dateLabel').textContent=`${d.getMonth()+1}月${d.getDate()}日 · ${WEEKDAYS[d.getDay()]}${curDate===TODAY?' (今天)':''}`;
  const wn=weekNum(curDate);
  const W=PLAN_WEEKS;
  document.getElementById('weekBadge').textContent=(wn>=1&&wn<=W)?`第 ${wn} 周 / 共 ${W} 周 · Week ${wn} of ${W}`:'计划期外 Outside plan';
  document.getElementById('streakBadge').textContent=`🔥 ${streak()}天`;
}
function navDate(n){
  const next=addDays(curDate,n);
  if(parse(next)>parse(TODAY)) { toast('未来还没到呢 😉'); return; }
  curDate=next; renderHeader(); renderToday(); if(curTab!=='today') switchTab('today');
}
function switchTab(t){
  curTab=t;
  ['today','weight','history','settings'].forEach(x=>{
    document.getElementById('view-'+x).style.display=x===t?'':'none';
    document.getElementById('tab-'+x).className=x===t?'on':'';
  });
  document.getElementById('datenav').style.display=t==='today'?'flex':'none';
  if(t==='today')renderToday(); if(t==='weight')renderWeight(); if(t==='history')renderHistory(); if(t==='settings')renderSettings();
  renderHeader();
}
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}
function renderAll(){ renderHeader(); renderToday(); }
renderAll();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
